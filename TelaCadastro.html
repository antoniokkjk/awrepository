<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Aluga Aí</title>
</head>
<body>

    <header>
        <h1>ALUGA AÍ</h1>
    </header>

    <section>
        <h2>Cadastro</h2>

        <form action="TelaVerificação.html">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="usuário">Usuário</label>
            <input type="text" id="usuário" name="usuário" required><br><br>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" required><br><br>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required><br><br>

            <label for="repetir_senha">Repetir senha</label>
            <input type="password" id="repetir_senha" name="repetir_senha" required><br><br>

            <button type="submit">Avançar</button>
        </form>
        <br>


    </section>
    <br><br>

    <a href="index.html"><button>Voltar a tela inicial</button></a>


</body>
</html>
