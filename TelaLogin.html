<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluga Aí</title>
</head>
<body>
    <!-- cabecalho da pagina de login-->
    <header>
        <h1>ALUGA AÍ</h1>
    </header>
    
    <!-- sessao do formulario de login -->
    <section>
        <form>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="E-mail" required><br><br>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Senha" required><br><br>

            <label for="manter_conectado">Manter conectado</label>
            <input type="checkbox" name="manter_conectado" id="manter_conectado"><br><br>

            <button>Acessar</button>
        </form>
    </section>
    
        <br><br>
    <!-- botao de voltar a pagina inicial(index)-->
    <a href="index.html"><button>Voltar a tela inicial</button></a>

</body>
</html>
